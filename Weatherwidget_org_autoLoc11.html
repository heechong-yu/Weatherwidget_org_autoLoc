<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" http-equiv="refresh" content="600">
  <title>DateTime_JS</title>
  
<script type="text/javascript"> 
function display_c(){
var refresh=1000; // Refresh rate in milli seconds
mytime=setTimeout('display_ct()',refresh)
}

function display_ct() {
var x = new Date()

// date part ///
var month=x.getMonth();
var wday=x.getDay();
var day=x.getDate();
var year=x.getFullYear();
switch (new Date().getMonth()) {
  case 0:
    month = "Jan";
    break;
  case 1:
    month = "Feb";
    break;
  case 2:
    month = "Mar";
    break;
  case 3:
    month = "April";
    break;
  case 4:
    month = "May";
    break;
  case 5:
    month = "June";
    break;
  case  6:
    month = "July";
    break;
  case  7:
    month = "Aug";
    break;
  case  8:
    month = "Sep";
    break;
  case  6:
    month = "July";
    break;
  case  9:
    month = "Oct";
    break;
  case  10:
    month = "Nov";
    break;
  case  11:
    month = "Dec";
}
switch (new Date().getDay()) {
  case 0:
    wday = "Sunday";
    break;
  case 1:
    wday = "Monday";
    break;
  case 2:
    wday = "Tuesday";
    break;
  case 3:
    wday = "Wednesday";
    break;
  case 4:
    wday = "Thursday";
    break;
  case 5:
    wday = "Friday";
    break;
  case  6:
    wday = "Saturday";
}
if (day <10 ){day='0' + day;}
// time part //
var hour=x.getHours();
var minute=x.getMinutes();
var second=x.getSeconds();
if(hour <10 ){hour='0'+hour;}
if(minute <10 ) {minute='0' + minute; }
if(second<10){second='0' + second;}

x1= wday + " " + month + " " + day + ", " + x.getFullYear();
x2 = hour+ ":" +  minute + ":" +  second + "  CST"  + " - " + x1 ;

document.getElementById('ct').style.font="bold 60px Orbitron,sans-serif";
document.getElementById('ct').style.color='#0030c0';
document.getElementById('ct').innerHTML = x2;
display_c();
}
</script>
</head>

<body onload=display_ct();>
<div style="text-align:center">
<span id='ct' ></span>
</div>
</body>
